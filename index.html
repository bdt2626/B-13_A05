<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <style>
        
        body { opacity: 0; transition: opacity 0.3s ease-in-out; }
    </style>
    
    <script>
       
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.replace('login.html');
        } else {
            
            document.addEventListener("DOMContentLoaded", () => {
                document.body.style.opacity = "1";
            });
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="./styles/style.css">
</head>





<body>
  

    <!-- nav bar here -->
<div class="navbar bg-base-100 shadow-sm px-4 md:px-10 flex flex-col md:flex-row gap-4 py-3 md:py-0">
  
  <div class="flex-1 flex items-center justify-between w-full md:w-auto">
    <div class="flex items-center">
      <img src="./images/github-logo.png" class="w-8 h-8 md:w-10 md:h-10" alt="Logo">
      <a class="font-semibold text-lg md:text-xl px-2">GitHub Issues Tracker</a>
    </div>
  </div>

  <div class="flex flex-col md:flex-row items-center gap-3 md:gap-6 w-full md:w-auto">
    
    <div class="relative w-full md:w-[300px]">
      <input id="search-input" onkeyup="handleSearch()" type="text" placeholder="Search issues...." 
        class="input input-bordered w-full pl-10 peer focus:placeholder:text-transparent transition-all duration-200" />
      <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 z-20 pointer-events-none text-gray-400 peer-focus:opacity-0 peer-[:not(:placeholder-shown)]:opacity-0"></i>
    </div>

    <div class="w-full md:w-auto">
      <button class="btn btn-primary w-full md:w-auto">+ New Issue</button>
    </div>
  </div>
</div>
    <!-- nav bar ends -->

    <!-- buttons are here -->
    <section class="container mx-auto mt-15 py-6 px-4 bg-white shadow-sm rounded-[10px]">
       <div class="flex flex-wrap">
          <button id="btn-all" onclick="handleButtonClick('all')" 
          class="filter-btn btn btn-primary w-full md:w-[120px] md:mr-2 mb-2 md:mb-0">All</button>
    
          <button id="btn-open" onclick="handleButtonClick('open')" 
          class="filter-btn btn btn-outline w-full md:w-[120px] md:mr-2 mb-2 md:mb-0">Open</button>
    
          <button id="btn-closed" onclick="handleButtonClick('closed')" 
          class="filter-btn btn btn-outline w-full md:w-[120px] mb-2 md:mb-0">Closed</button>
      </div>

    </section>
  <!-- buttons end here -->
   
  <!-- issues counter starts here -->
  <section class="container mx-auto mt-4 px-4 rounded-[10px] bg-white shadow-sm">

        <div class="py-4 flex flex-col md:flex-row md:justify-between gap-4">

        
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-[#ECE4FF] rounded-full flex items-center justify-center">
              <img src="./images/Aperture.png" class="w-6 h-6">
            </div>

            <div>
              <h2 class="font-bold text-xl md:text-2xl"> <span id="issue-counter">35</span> issues</h2>
              <p class="text-sm md:text-base">Track and manage your project issues</p>
            </div>
          </div>

          
          <div class="flex gap-6 items-center md:justify-end">
            <p class="px-4">
              <i class="fa-solid fa-circle text-[#00A96E] mr-1 text-sm"></i>
              Open
            </p>

            <p>
              <i class="fa-solid fa-circle text-[#A855F7] mr-1 text-sm"></i>
              Close
            </p>
          </div>

        </div>
        
  </section>
  <!-- issues counter ends here -->

   <!-- issues container starts here -->

  <section class="container mx-auto mt-4 px-4 rounded-[10px] bg-white shadow-sm">
    <!-- <div id="all-issues" class="grid grid-cols-1 md:grid-cols-4 gap-6 "> -->
      <div id="all-issues" class="grid grid-cols-1 md:grid-cols-4 gap-6 min-h-[600px] items-start mx-auto ">
        <div id="main-loader" class="col-span-full flex justify-center py-20">
        <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>
    </div>

  </section>
   <!-- issues container ends here -->

   <!-- loader part start -->
  
  <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle bg-black/40">
    <div class="modal-box relative bg-white rounded-lg shadow-xl p-6 max-w-lg border border-gray-100">
      
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2 text-gray-400">✕</button>
      </form>

      <div class="mb-4">
        <h3 id="modal-title" class="font-bold text-xl text-slate-900 mb-1"></h3>
        <div class="flex items-center gap-2 text-xs text-gray-500 font-medium">
          <span id="modal-status-badge"></span>
          <span>•</span>
          <span id="modal-meta-info"></span>
        </div>
      </div>

      <div id="modal-labels" class="flex flex-wrap gap-1.5 mb-5"></div>

      <div class="mb-6 text-slate-600 leading-normal text-sm">
        <p id="modal-description"></p>
      </div>

      <div class="bg-slate-50 border border-slate-100 rounded-lg p-4 grid grid-cols-2 gap-4 mb-6">
        <div>
          <h4 class="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-1">Assignee:</h4>
          <p id="modal-assignee" class="font-bold text-slate-800 text-base"></p>
        </div>
        <div>
          <h4 class="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-1">Priority:</h4>
          <span id="modal-priority-badge"></span>
        </div>
      </div>

      <div class="modal-action mt-0 border-t border-gray-50 pt-4 flex justify-end">
        <form method="dialog">
          <button class="btn btn-primary btn-sm px-6 h-10 bg-indigo-600 border-none hover:bg-indigo-700 text-white normal-case">Close</button>
        </form>
      </div>
    </div>
  </dialog>
  <!-- loader part ends -->

    <!-- js connected here -->
    <script src="./scripts/script.js"></script>
</body>
</html>
